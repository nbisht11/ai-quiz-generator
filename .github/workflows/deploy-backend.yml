name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Only trigger this workflow if backend files are changed
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Run commands inside the backend folder

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Speeds up builds by caching dependencies

      - name: Run Tests
        run: mvn clean test

  deploy:
    needs: test # This ensures deployment ONLY happens if tests pass
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy Hook
        # Uses curl to ping the secure URL Render provides
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set!"
            exit 1
          fi
          curl -X POST -d "" "${{ secrets.RENDER_DEPLOY_HOOK }}"